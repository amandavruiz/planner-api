name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  schedule:
    # Executa diariamente as 18:30 UTC
    - cron: "30 18 * * *"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Start API
        run: |
          node src/server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API readiness
        run: |
          set -e
          MAX_RETRIES=30
          SLEEP_SECONDS=1

          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sSf http://127.0.0.1:3000/ > /dev/null; then
              echo "API is ready after $i attempt(s)."
              exit 0
            fi

            echo "Attempt $i/$MAX_RETRIES: API not ready yet..."
            sleep $SLEEP_SECONDS
          done

          echo "API did not become ready in time."
          echo "--- server.log (tail) ---"
          tail -n 100 server.log || true
          exit 1

      - name: Run Robot Framework suites
        run: |
          robot \
            -d reports/robot \
            tests

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Show server logs on failure
        if: failure()
        run: cat server.log

      - name: Upload Robot report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: reports/robot
          retention-days: 14
